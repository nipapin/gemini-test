<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Photo Restoration</title>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="apple-touch-icon" href="/favicon.svg" />
        <meta name="theme-color" content="#7c5cff" />
        <meta name="description" content="Восстановление старых и повреждённых фотографий с помощью ИИ." />
        <style>
            :root {
                --bg-0: #0b0d12;
                --bg-1: #0f1218;
                --surface: #141822;
                --surface-2: #1a1f2c;
                --border: #232936;
                --border-strong: #2f3646;
                --text: #eef1f6;
                --muted: #8a93a6;
                --accent: #7c5cff;
                --accent-2: #5ad1ff;
                --ok: #4ade80;
                --danger: #ff5a7a;
                --r-lg: 16px;
                --r-md: 12px;
                --r-sm: 10px;
                --shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.6);
            }
            * { box-sizing: border-box; }
            html, body { margin: 0; padding: 0; }
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                color: var(--text);
                background:
                    radial-gradient(900px 500px at -10% -20%, rgba(124, 92, 255, 0.18), transparent 60%),
                    radial-gradient(800px 500px at 110% 0%, rgba(90, 209, 255, 0.12), transparent 60%),
                    var(--bg-0);
                min-height: 100vh;
                -webkit-font-smoothing: antialiased;
            }
            .wrap {
                max-width: 980px;
                margin: 0 auto;
                padding: 48px 24px 80px;
            }
            .hero {
                text-align: left;
                margin-bottom: 28px;
            }
            .hero h1 {
                margin: 0;
                font-size: 32px;
                font-weight: 700;
                letter-spacing: -0.02em;
            }
            .hero h1 span {
                background: linear-gradient(135deg, var(--accent), var(--accent-2));
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }
            .hero p {
                margin: 8px 0 0;
                color: var(--muted);
                font-size: 15px;
            }
            .section {
                background: linear-gradient(180deg, var(--surface), var(--bg-1));
                border: 1px solid var(--border);
                border-radius: var(--r-lg);
                padding: 28px;
                box-shadow: var(--shadow);
            }
            .section + .section { margin-top: 20px; }
            .section-head {
                display: flex;
                align-items: baseline;
                justify-content: space-between;
                gap: 12px;
                margin-bottom: 18px;
            }
            .section-head h2 {
                margin: 0;
                font-size: 16px;
                font-weight: 600;
                letter-spacing: -0.01em;
            }
            .section-head .muted { color: var(--muted); font-size: 13px; }

            /* DROPZONE */
            .dropzone {
                position: relative;
                display: flex;
                align-items: center;
                gap: 18px;
                padding: 22px 22px;
                border-radius: var(--r-md);
                border: 1.5px dashed var(--border-strong);
                background: var(--surface-2);
                color: var(--muted);
                cursor: pointer;
                transition: border-color 0.15s, background 0.15s;
                min-height: 96px;
            }
            .dropzone:hover,
            .dropzone.drag {
                border-color: var(--accent);
                background: rgba(124, 92, 255, 0.05);
            }
            .dropzone input { display: none; }
            .dropzone .icon {
                width: 48px;
                height: 48px;
                border-radius: 12px;
                display: grid;
                place-items: center;
                background: linear-gradient(135deg, rgba(124, 92, 255, 0.22), rgba(90, 209, 255, 0.18));
                color: var(--accent-2);
                flex: 0 0 auto;
            }
            .dropzone .text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
            .dropzone .title {
                color: var(--text);
                font-weight: 600;
                font-size: 15px;
            }
            .dropzone .sub { font-size: 13px; color: var(--muted); }
            .dropzone.has-file {
                border-style: solid;
                border-color: var(--border-strong);
                padding: 14px;
            }
            #dropzoneFilled {
                display: none;
                width: 100%;
                align-items: center;
                gap: 14px;
            }
            .dropzone.has-file #dropzoneEmpty { display: none; }
            .dropzone.has-file #dropzoneFilled { display: flex; }
            .preview {
                width: 72px;
                height: 72px;
                object-fit: cover;
                border-radius: 10px;
                background: #000;
                flex: 0 0 auto;
            }
            .preview-meta {
                display: flex;
                flex-direction: column;
                gap: 2px;
                font-size: 13px;
                color: var(--muted);
                min-width: 0;
                flex: 1 1 auto;
            }
            .preview-meta strong {
                color: var(--text);
                font-weight: 500;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .ghost-btn {
                background: transparent;
                color: var(--muted);
                border: 1px solid var(--border-strong);
                border-radius: 8px;
                padding: 7px 12px;
                font-size: 13px;
                cursor: pointer;
                flex: 0 0 auto;
            }
            .ghost-btn:hover { color: var(--text); border-color: var(--text); }

            /* CONTROLS */
            .controls {
                margin-top: 16px;
                display: grid;
                grid-template-columns: 1fr auto;
                gap: 12px;
                align-items: stretch;
            }
            .field-wrap { display: flex; flex-direction: column; gap: 6px; }
            label.field {
                font-size: 13px;
                color: var(--muted);
            }
            textarea {
                width: 100%;
                min-height: 80px;
                resize: vertical;
                background: var(--surface-2);
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: var(--r-sm);
                padding: 12px 14px;
                font: inherit;
                font-size: 14px;
                line-height: 1.5;
                transition: border-color 0.15s, box-shadow 0.15s;
            }
            textarea::placeholder { color: #5e6677; }
            textarea:focus {
                outline: none;
                border-color: rgba(124, 92, 255, 0.6);
                box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.08);
            }
            .actions {
                display: flex;
                align-items: flex-end;
            }
            button.primary {
                background: linear-gradient(135deg, var(--accent), var(--accent-2));
                color: #0b0d12;
                border: 0;
                border-radius: var(--r-sm);
                font-weight: 700;
                padding: 0 22px;
                height: 80px;
                cursor: pointer;
                font-size: 14px;
                letter-spacing: 0.01em;
                transition: transform 0.05s, filter 0.15s, opacity 0.15s;
                min-width: 140px;
            }
            button.primary:hover { filter: brightness(1.05); }
            button.primary:active { transform: translateY(1px); }
            button.primary:focus { outline: none; box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.25); }
            button.primary:disabled { opacity: 0.5; cursor: not-allowed; filter: none; box-shadow: none; }
            @media (max-width: 640px) {
                .controls { grid-template-columns: 1fr; }
                button.primary { height: 48px; width: 100%; }
            }

            /* STATUS */
            .status {
                display: none;
                margin-top: 14px;
                padding: 10px 14px;
                border-radius: 10px;
                font-size: 14px;
            }
            .status.show { display: flex; align-items: center; gap: 10px; }
            .status.info { background: rgba(90, 209, 255, 0.08); color: var(--accent-2); border: 1px solid rgba(90, 209, 255, 0.25); }
            .status.error { background: rgba(255, 90, 122, 0.08); color: var(--danger); border: 1px solid rgba(255, 90, 122, 0.25); }
            .status.ok { background: rgba(74, 222, 128, 0.08); color: var(--ok); border: 1px solid rgba(74, 222, 128, 0.25); }

            /* RESULT */
            .result { display: none; margin-top: 20px; }
            .result.show { display: block; }
            .pair {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }
            @media (max-width: 720px) { .pair { grid-template-columns: 1fr; } }
            figure.tile {
                margin: 0;
                background: var(--surface-2);
                border: 1px solid var(--border);
                border-radius: var(--r-md);
                overflow: hidden;
            }
            figure.tile img {
                display: block;
                width: 100%;
                height: auto;
                background: #000;
                aspect-ratio: 4 / 3;
                object-fit: contain;
            }
            figure.tile figcaption {
                padding: 10px 12px;
                color: var(--muted);
                font-size: 13px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-top: 1px solid var(--border);
            }
            figure.tile figcaption .tag {
                font-weight: 600;
                color: var(--text);
            }
            figure.tile figcaption a { color: var(--accent-2); text-decoration: none; }
            figure.tile figcaption a:hover { text-decoration: underline; }

            /* GALLERY */
            .gallery {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            .gallery a {
                display: block;
                border-radius: var(--r-sm);
                overflow: hidden;
                border: 1px solid var(--border);
                background: var(--surface-2);
                aspect-ratio: 1 / 1;
                transition: transform 0.15s, border-color 0.15s;
            }
            .gallery a:hover { transform: translateY(-2px); border-color: var(--accent); }
            .gallery img { display: block; width: 100%; height: 100%; object-fit: cover; }
            .gallery-empty {
                color: var(--muted);
                font-size: 14px;
                padding: 8px 0;
            }

            /* SPINNER */
            .spinner {
                width: 14px;
                height: 14px;
                border: 2px solid rgba(255, 255, 255, 0.25);
                border-top-color: currentColor;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
                flex: 0 0 auto;
            }
            @keyframes spin { to { transform: rotate(360deg); } }

            code { background: var(--surface-2); padding: 1px 6px; border-radius: 6px; font-size: 12px; }
        </style>
    </head>
    <body>
        <div class="wrap">
            <header class="hero">
                <h1><span>Photo</span> Restoration</h1>
                <p>Загрузите старое или повреждённое фото — получите восстановленную версию.</p>
            </header>

            <section class="section">
                <div class="section-head">
                    <h2>Загрузить фото</h2>
                    <span class="muted">JPG, PNG, WEBP · до 20 MB</span>
                </div>

                <label id="dropzone" class="dropzone">
                    <input id="file" type="file" accept="image/*" />
                    <div id="dropzoneEmpty" style="display: flex; align-items: center; gap: 18px; width: 100%;">
                        <div class="icon" aria-hidden="true">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="17 8 12 3 7 8" />
                                <line x1="12" y1="3" x2="12" y2="15" />
                            </svg>
                        </div>
                        <div class="text">
                            <div class="title">Перетащите фото сюда</div>
                            <div class="sub">или нажмите, чтобы выбрать с компьютера</div>
                        </div>
                    </div>
                    <div id="dropzoneFilled">
                        <img id="previewImg" class="preview" alt="preview" />
                        <div class="preview-meta">
                            <strong id="previewName"></strong>
                            <span id="previewSize"></span>
                        </div>
                        <button id="clearBtn" type="button" class="ghost-btn">Заменить</button>
                    </div>
                </label>

                <div class="controls">
                    <div class="field-wrap">
                        <label class="field" for="prompt">Дополнительные пожелания (необязательно)</label>
                        <textarea id="prompt" placeholder="Например: убери царапины и трещины, сделай цвета естественнее, повысь резкость на лицах"></textarea>
                    </div>
                    <div class="actions">
                        <button id="submit" class="primary" type="button" disabled>Восстановить</button>
                    </div>
                </div>

                <div id="status" class="status"></div>

                <div id="result" class="result">
                    <div class="pair">
                        <figure class="tile">
                            <img id="originalImg" alt="original" />
                            <figcaption><span class="tag">Оригинал</span></figcaption>
                        </figure>
                        <figure class="tile">
                            <img id="restoredImg" alt="restored" />
                            <figcaption>
                                <span class="tag">Результат</span>
                                <a id="downloadLink" href="#" download>Скачать</a>
                            </figcaption>
                        </figure>
                    </div>
                </div>
            </section>

            <section class="section">
                <div class="section-head">
                    <h2>Галерея</h2>
                    <span class="muted">Хранится в <code>/restorations</code></span>
                </div>
                <div id="gallery" class="gallery"></div>
            </section>
        </div>

        <script>
            const fileInput = document.getElementById("file");
            const dropzone = document.getElementById("dropzone");
            const dropzoneEmpty = document.getElementById("dropzoneEmpty");
            const dropzoneFilled = document.getElementById("dropzoneFilled");
            const previewImg = document.getElementById("previewImg");
            const previewName = document.getElementById("previewName");
            const previewSize = document.getElementById("previewSize");
            const clearBtn = document.getElementById("clearBtn");
            const submitBtn = document.getElementById("submit");
            const promptInput = document.getElementById("prompt");
            const statusEl = document.getElementById("status");
            const resultEl = document.getElementById("result");
            const originalImg = document.getElementById("originalImg");
            const restoredImg = document.getElementById("restoredImg");
            const downloadLink = document.getElementById("downloadLink");
            const galleryEl = document.getElementById("gallery");

            let selectedFile = null;
            let previewUrl = null;

            const setStatus = (text, kind) => {
                statusEl.innerHTML = "";
                if (!text) {
                    statusEl.className = "status";
                    return;
                }
                statusEl.className = "status show " + (kind === "loading" ? "info" : kind || "info");
                if (kind === "loading") {
                    const sp = document.createElement("span");
                    sp.className = "spinner";
                    statusEl.appendChild(sp);
                }
                statusEl.appendChild(document.createTextNode(text));
            };

            const formatSize = (bytes) => {
                if (bytes < 1024) return bytes + " B";
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + " KB";
                return (bytes / 1024 / 1024).toFixed(1) + " MB";
            };

            const pickFile = (file) => {
                if (!file) return;
                if (!file.type.startsWith("image/")) {
                    setStatus("Можно загружать только изображения", "error");
                    return;
                }
                selectedFile = file;
                if (previewUrl) URL.revokeObjectURL(previewUrl);
                previewUrl = URL.createObjectURL(file);
                previewImg.src = previewUrl;
                previewName.textContent = file.name;
                previewSize.textContent = formatSize(file.size);
                dropzone.classList.add("has-file");
                submitBtn.disabled = false;
                setStatus("");
            };

            const clearFile = () => {
                selectedFile = null;
                if (previewUrl) URL.revokeObjectURL(previewUrl);
                previewUrl = null;
                fileInput.value = "";
                dropzone.classList.remove("has-file");
                submitBtn.disabled = true;
                resultEl.classList.remove("show");
            };

            fileInput.addEventListener("change", (e) => pickFile(e.target.files?.[0]));
            clearBtn.addEventListener("click", (e) => {
                e.preventDefault();
                e.stopPropagation();
                clearFile();
            });

            ["dragenter", "dragover"].forEach((evt) =>
                dropzone.addEventListener(evt, (e) => {
                    e.preventDefault();
                    dropzone.classList.add("drag");
                })
            );
            ["dragleave", "drop"].forEach((evt) =>
                dropzone.addEventListener(evt, (e) => {
                    e.preventDefault();
                    dropzone.classList.remove("drag");
                })
            );
            dropzone.addEventListener("drop", (e) => pickFile(e.dataTransfer?.files?.[0]));

            submitBtn.addEventListener("click", async () => {
                if (!selectedFile) return;
                submitBtn.disabled = true;
                resultEl.classList.remove("show");
                setStatus("Восстанавливаем фото, это может занять до минуты…", "loading");

                const form = new FormData();
                form.append("photo", selectedFile);
                form.append("prompt", promptInput.value);

                try {
                    const res = await fetch("/api/restore", { method: "POST", body: form });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || "Не удалось восстановить");
                    originalImg.src = previewUrl || data.original || "";
                    restoredImg.src = data.restored;
                    downloadLink.href = data.restored;
                    resultEl.classList.add("show");
                    setStatus("Готово", "ok");
                    loadGallery();
                } catch (err) {
                    setStatus(err.message || String(err), "error");
                } finally {
                    submitBtn.disabled = false;
                }
            });

            const loadGallery = async () => {
                try {
                    const res = await fetch("/api/gallery");
                    const data = await res.json();
                    galleryEl.innerHTML = "";
                    if (!data.items?.length) {
                        const empty = document.createElement("div");
                        empty.className = "gallery-empty";
                        empty.textContent = "Пока нет восстановленных фото.";
                        galleryEl.appendChild(empty);
                        return;
                    }
                    for (const item of data.items) {
                        const a = document.createElement("a");
                        a.href = item.url;
                        a.target = "_blank";
                        a.rel = "noopener";
                        const img = document.createElement("img");
                        img.src = item.url;
                        img.loading = "lazy";
                        a.appendChild(img);
                        galleryEl.appendChild(a);
                    }
                } catch {
                    galleryEl.innerHTML = '<div class="gallery-empty">Не удалось загрузить галерею.</div>';
                }
            };
            loadGallery();
        </script>
    </body>
</html>
